{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center main-card">

    <div class="col-lg-6 col-md-8">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <div class="icon-circle">
                        <i class="fas fa-user-plus"></i>
                    </div>

                    <h2 class="mt-3 text-primary">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Register to use the AI Breast Cancer Detection System
                    </p>

                </div>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Create a password"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            id="confirm"
                            name="confirm"
                            class="form-control"
                            placeholder="Confirm password"
                            required>

                    </div>

                    <div class="form-check mb-4">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            onclick="showPassword()">

                        <label class="form-check-label">

                            Show Password

                        </label>

                    </div>

                    <button class="btn btn-success w-100">

                        <i class="fas fa-user-plus"></i>

                        Register

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    Already have an account?

                    <br><br>

                    <a href="{{ url_for('login') }}"
                       class="btn btn-primary">

                        <i class="fas fa-sign-in-alt"></i>

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function showPassword(){

    var p=document.getElementById("password");
    var c=document.getElementById("confirm");

    if(p.type==="password"){

        p.type="text";
        c.type="text";

    }else{

        p.type="password";
        c.type="password";

    }

}

</script>

{% endblock %}
